# fly.toml app configuration file generated for buffalo-beacon on 2026-07-08T01:51:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'buffalo-beacon'
primary_region = 'ewr'

[build]

[env]
  DB_PATH = '/data/beacon.sqlite'
  PORT = '3000'

[[mounts]]
  source = 'beacon_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
